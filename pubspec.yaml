name: trip_io
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.2.2
  image_picker: ^1.2.3
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
  windows:
    generate: true
  macos:
    generate: true
  web:
    generate: true
    background_color: "#FFFFFF"
    theme_color: "#0A7E8C"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/backgrounds/
    - assets/logo.png
