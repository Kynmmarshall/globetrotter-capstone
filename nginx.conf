server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;

    # Flutter web build assets are content-addressed by main.dart.js's own
    # version.json/service worker, not filename hashing - so avoid caching
    # index.html and the service worker, but static assets are safe to cache.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
